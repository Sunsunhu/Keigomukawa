<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.typekit.net/pex8zol.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #000;
    }
    .frame {
      position: relative;
      width: 1200px;
      height: 630px;
    }
    .bg {
      position: absolute;
      inset: 0;
    }
    .bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 72% 40%;
      display: block;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0, 0, 0, 0.55) 0%,
        rgba(0, 0, 0, 0.1) 50%,
        rgba(0, 0, 0, 0.2) 100%
      );
    }
    .content {
      position: absolute;
      left: 56px;
      bottom: 68px;
      color: #fff;
      z-index: 2;
      max-width: 560px;
    }
    .name {
      font-family: trajan-pro-3, 'Cormorant Garamond', Georgia, serif;
      font-size: 74px;
      letter-spacing: 0.12em;
      line-height: 1.05;
      font-weight: 400;
      margin-bottom: 18px;
      text-transform: none;
    }
    .tagline {
      font-family: trajan-pro-3, 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      letter-spacing: 0.18em;
      opacity: 0.92;
      line-height: 1.55;
      max-width: 34rem;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="bg">
      <img src="../public/images/hero-cover.png" alt="">
    </div>
    <div class="overlay"></div>
    <div class="content">
      <div class="name">Keigo<br>Mukawa</div>
      <p class="tagline">Pianiste — Lauréat Reine Élisabeth &amp; Long-Thibaud-Crespin</p>
    </div>
  </div>
</body>
</html>
